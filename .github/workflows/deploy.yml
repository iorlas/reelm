name: Build and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: |
          uv run ruff format --check src/ tests/
          uv run ruff check src/ tests/
          uv run ty check src/
          git ls-files '*.yml' '*.yaml' | xargs uv run yamllint -s
          uv run python scripts/check-json.py
          uv run python scripts/check-file-length.py

      - name: Test
        run: make test

      - name: Diff coverage
        if: github.event_name == 'pull_request'
        run: make coverage-diff

  build-and-push:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      # Validate compose syntax before anything else
      - name: Validate compose syntax
        run: |
          export IMAGE_TAG=test
          export TRANSMISSION_USER=x TRANSMISSION_PASS=x
          export JACKETT_API_KEY=x WEBDAV_URL=x WEBDAV_USER=x WEBDAV_PASS=x TMDB_API_KEY=x
          export GOOGLE_CLIENT_ID=x GOOGLE_CLIENT_SECRET=x
          export OPENMEMORY_POSTGRES_USER=x OPENMEMORY_POSTGRES_PASSWORD=x
          docker compose -f docker-compose.prod.yml config --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=main-

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact attestation
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Deploy to Dokploy
        if: github.event_name != 'pull_request'
        env:
          # dokctl config
          DOKPLOY_AUTH_TOKEN: ${{ secrets.DOKPLOY_AUTH_TOKEN }}
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
          # App secrets — dokctl auto-detects these from ${VAR} refs in compose file
          IMAGE_TAG: main-${{ github.sha }}
          JACKETT_API_KEY: ${{ secrets.JACKETT_API_KEY }}
          TRANSMISSION_USER: ${{ secrets.TRANSMISSION_USER }}
          TRANSMISSION_PASS: ${{ secrets.TRANSMISSION_PASS }}
          WEBDAV_URL: ${{ secrets.WEBDAV_URL }}
          WEBDAV_USER: ${{ secrets.WEBDAV_USER }}
          WEBDAV_PASS: ${{ secrets.WEBDAV_PASS }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          OPENMEMORY_POSTGRES_USER: ${{ secrets.OPENMEMORY_POSTGRES_USER }}
          OPENMEMORY_POSTGRES_PASSWORD: ${{ secrets.OPENMEMORY_POSTGRES_PASSWORD }}
        run: |
          mkdir -p ~/.config/dokploy
          echo "${DOKPLOY_AUTH_TOKEN}" > ~/.config/dokploy/token
          echo "${DOKPLOY_URL}" > ~/.config/dokploy/url

          uv run scripts/dokctl.py deploy "${DOKPLOY_COMPOSE_ID}" docker-compose.prod.yml
