name: Build and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=main-

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact attestation
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Sync compose file and env to Dokploy (atomic)
        if: github.event_name != 'pull_request'
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_AUTH_TOKEN: ${{ secrets.DOKPLOY_AUTH_TOKEN }}
          DOKPLOY_COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
          JACKETT_API_KEY: ${{ secrets.JACKETT_API_KEY }}
          TRANSMISSION_USER: ${{ secrets.TRANSMISSION_USER }}
          TRANSMISSION_PASS: ${{ secrets.TRANSMISSION_PASS }}
          WEBDAV_URL: ${{ secrets.WEBDAV_URL }}
          WEBDAV_USER: ${{ secrets.WEBDAV_USER }}
          WEBDAV_PASS: ${{ secrets.WEBDAV_PASS }}
        run: |
          IMAGE_TAG="main-$(echo '${{ github.sha }}' | cut -c1-7)"
          ENV_CONTENT=$(printf '%s\n' \
            "IMAGE_TAG=${IMAGE_TAG}" \
            "JACKETT_API_KEY=${JACKETT_API_KEY}" \
            "TRANSMISSION_USER=${TRANSMISSION_USER}" \
            "TRANSMISSION_PASS=${TRANSMISSION_PASS}" \
            "WEBDAV_URL=${WEBDAV_URL}" \
            "WEBDAV_USER=${WEBDAV_USER}" \
            "WEBDAV_PASS=${WEBDAV_PASS}" \
          )

          curl -sf -X POST "${DOKPLOY_URL}/api/compose.update" \
            -H "x-api-key: ${DOKPLOY_AUTH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg id "${DOKPLOY_COMPOSE_ID}" \
              --arg env "$ENV_CONTENT" \
              --arg compose "$(cat docker-compose.prod.yml)" \
              '{composeId: $id, env: $env, composeFile: $compose}'
            )"

      - name: Trigger Dokploy deploy
        if: github.event_name != 'pull_request'
        uses: benbristow/dokploy-deploy-action@0.2.2
        with:
          api_token: ${{ secrets.DOKPLOY_AUTH_TOKEN }}
          application_id: ${{ secrets.DOKPLOY_COMPOSE_ID }}
          dokploy_url: ${{ secrets.DOKPLOY_URL }}
          service_type: compose
