name: Build and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: |
          uv run ruff format --check src/ tests/
          uv run ruff check src/ tests/
          uv run ty check src/
          git ls-files '*.yml' '*.yaml' | xargs uv run yamllint -s
          uv run python scripts/check-json.py
          uv run python scripts/check-file-length.py

      - name: Test
        run: make test

      - name: Diff coverage
        if: github.event_name == 'pull_request'
        run: make coverage-diff

  build-and-push:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Validate compose syntax before anything else
      - name: Validate compose syntax
        run: |
          export IMAGE_TAG=test
          export TRANSMISSION_USER=x TRANSMISSION_PASS=x
          export JACKETT_API_KEY=x WEBDAV_URL=x WEBDAV_USER=x WEBDAV_PASS=x TMDB_API_KEY=x
          export GOOGLE_CLIENT_ID=x GOOGLE_CLIENT_SECRET=x
          export OPENMEMORY_POSTGRES_USER=x OPENMEMORY_POSTGRES_PASSWORD=x
          docker compose -f docker-compose.prod.yml config --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=main-

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact attestation
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Validate required secrets
        if: github.event_name != 'pull_request'
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_AUTH_TOKEN: ${{ secrets.DOKPLOY_AUTH_TOKEN }}
          DOKPLOY_COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
          JACKETT_API_KEY: ${{ secrets.JACKETT_API_KEY }}
          TRANSMISSION_USER: ${{ secrets.TRANSMISSION_USER }}
          TRANSMISSION_PASS: ${{ secrets.TRANSMISSION_PASS }}
          WEBDAV_URL: ${{ secrets.WEBDAV_URL }}
          WEBDAV_USER: ${{ secrets.WEBDAV_USER }}
          WEBDAV_PASS: ${{ secrets.WEBDAV_PASS }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          OPENMEMORY_POSTGRES_USER: ${{ secrets.OPENMEMORY_POSTGRES_USER }}
          OPENMEMORY_POSTGRES_PASSWORD: ${{ secrets.OPENMEMORY_POSTGRES_PASSWORD }}
        run: |
          MISSING=""
          [ -z "$DOKPLOY_URL" ] && MISSING="$MISSING DOKPLOY_URL"
          [ -z "$DOKPLOY_AUTH_TOKEN" ] && MISSING="$MISSING DOKPLOY_AUTH_TOKEN"
          [ -z "$DOKPLOY_COMPOSE_ID" ] && MISSING="$MISSING DOKPLOY_COMPOSE_ID"
          [ -z "$JACKETT_API_KEY" ] && MISSING="$MISSING JACKETT_API_KEY"
          [ -z "$TRANSMISSION_USER" ] && MISSING="$MISSING TRANSMISSION_USER"
          [ -z "$TRANSMISSION_PASS" ] && MISSING="$MISSING TRANSMISSION_PASS"
          [ -z "$WEBDAV_URL" ] && MISSING="$MISSING WEBDAV_URL"
          [ -z "$WEBDAV_USER" ] && MISSING="$MISSING WEBDAV_USER"
          [ -z "$WEBDAV_PASS" ] && MISSING="$MISSING WEBDAV_PASS"
          [ -z "$TMDB_API_KEY" ] && MISSING="$MISSING TMDB_API_KEY"
          [ -z "$GOOGLE_CLIENT_ID" ] && MISSING="$MISSING GOOGLE_CLIENT_ID"
          [ -z "$GOOGLE_CLIENT_SECRET" ] && MISSING="$MISSING GOOGLE_CLIENT_SECRET"
          [ -z "$OPENMEMORY_POSTGRES_USER" ] && MISSING="$MISSING OPENMEMORY_POSTGRES_USER"
          [ -z "$OPENMEMORY_POSTGRES_PASSWORD" ] && MISSING="$MISSING OPENMEMORY_POSTGRES_PASSWORD"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required secrets:$MISSING"
            exit 1
          fi

      - name: Sync compose + env to Dokploy (atomic) and verify
        if: github.event_name != 'pull_request'
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_AUTH_TOKEN: ${{ secrets.DOKPLOY_AUTH_TOKEN }}
          DOKPLOY_COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
          JACKETT_API_KEY: ${{ secrets.JACKETT_API_KEY }}
          TRANSMISSION_USER: ${{ secrets.TRANSMISSION_USER }}
          TRANSMISSION_PASS: ${{ secrets.TRANSMISSION_PASS }}
          WEBDAV_URL: ${{ secrets.WEBDAV_URL }}
          WEBDAV_USER: ${{ secrets.WEBDAV_USER }}
          WEBDAV_PASS: ${{ secrets.WEBDAV_PASS }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          OPENMEMORY_POSTGRES_USER: ${{ secrets.OPENMEMORY_POSTGRES_USER }}
          OPENMEMORY_POSTGRES_PASSWORD: ${{ secrets.OPENMEMORY_POSTGRES_PASSWORD }}
        run: |
          IMAGE_TAG="main-$(echo '${{ github.sha }}' | cut -c1-7)"

          # Build full env payload — every var Dokploy needs (full replacement, omitted = wiped)
          ENV_CONTENT=$(printf '%s\n' \
            "IMAGE_TAG=${IMAGE_TAG}" \
            "JACKETT_API_KEY=${JACKETT_API_KEY}" \
            "TRANSMISSION_USER=${TRANSMISSION_USER}" \
            "TRANSMISSION_PASS=${TRANSMISSION_PASS}" \
            "WEBDAV_URL=${WEBDAV_URL}" \
            "WEBDAV_USER=${WEBDAV_USER}" \
            "WEBDAV_PASS=${WEBDAV_PASS}" \
            "TMDB_API_KEY=${TMDB_API_KEY}" \
            "GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}" \
            "GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}" \
            "OPENMEMORY_POSTGRES_USER=${OPENMEMORY_POSTGRES_USER}" \
            "OPENMEMORY_POSTGRES_PASSWORD=${OPENMEMORY_POSTGRES_PASSWORD}" \
          )

          # Atomic update — env + compose together
          RESPONSE=$(curl -s --fail-with-body -X POST "${DOKPLOY_URL}/api/compose.update" \
            -H "x-api-key: ${DOKPLOY_AUTH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg id "${DOKPLOY_COMPOSE_ID}" \
              --arg env "$ENV_CONTENT" \
              --arg compose "$(cat docker-compose.prod.yml)" \
              '{composeId: $id, env: $env, composeFile: $compose}'
            )")

          # VERIFY update persisted (compose.update silently ignores wrong field names)
          STORED_LEN=$(echo "$RESPONSE" | jq -r '.composeFile | length')
          if [ "$STORED_LEN" -lt 10 ]; then
            echo "::error::compose.update did not persist composeFile (got $STORED_LEN chars)"
            echo "$RESPONSE" | jq -r '.sourceType, .composeFile[:100]'
            exit 1
          fi
          echo "compose.update verified: $STORED_LEN chars persisted"

      - name: Deploy and wait for completion
        if: github.event_name != 'pull_request'
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_AUTH_TOKEN: ${{ secrets.DOKPLOY_AUTH_TOKEN }}
          DOKPLOY_COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
        run: |
          IMAGE_TAG="main-$(echo '${{ github.sha }}' | cut -c1-7)"

          # Trigger deploy
          curl -s --fail-with-body -X POST "${DOKPLOY_URL}/api/compose.deploy" \
            -H "x-api-key: ${DOKPLOY_AUTH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"composeId\": \"${DOKPLOY_COMPOSE_ID}\", \"title\": \"Deploy ${IMAGE_TAG}\"}"

          echo "Deploy triggered, polling status..."

          # Poll deployment status (60 attempts x 5s = 5 min timeout)
          for i in $(seq 1 60); do
            sleep 5
            STATUS=$(curl -s "${DOKPLOY_URL}/api/deployment.allByCompose?composeId=${DOKPLOY_COMPOSE_ID}" \
              -H "x-api-key: ${DOKPLOY_AUTH_TOKEN}" | jq -r '.[0].status // "unknown"')

            echo "  Attempt $i/60: status=$STATUS"

            if [ "$STATUS" = "done" ]; then
              echo "Deploy succeeded"
              exit 0
            fi

            if [ "$STATUS" = "error" ]; then
              echo "::error::Deploy FAILED"
              curl -s "${DOKPLOY_URL}/api/deployment.allByCompose?composeId=${DOKPLOY_COMPOSE_ID}" \
                -H "x-api-key: ${DOKPLOY_AUTH_TOKEN}" | jq -r '.[0].errorMessage // "no error message"'
              exit 1
            fi
          done

          echo "::error::Deploy TIMEOUT (5 min)"
          exit 1
