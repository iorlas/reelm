# Pre-commit hooks configuration
# Install: brew install prek && prek install (or: pip install pre-commit && pre-commit install)
repos:
  - repo: local
    hooks:
      - id: fix
        name: auto-fix (ruff)
        entry: make fix
        language: system
        pass_filenames: false
        always_run: true

      - id: lint
        name: lint (ruff + ty + yamllint + hadolint + compose)
        entry: make lint
        language: system
        pass_filenames: false
        always_run: true
