x-reelm: &reelm
  image: ghcr.io/iorlas/reelm:${IMAGE_TAG}
  expose:
    - "8000"
  networks:
    - dokploy-network
  restart: unless-stopped
  healthcheck:
    test: ["CMD-SHELL", "curl -sf -o /dev/null -w '%{http_code}' http://localhost:8000/ | grep -qE '200|404|406'"]
    interval: 10s
    timeout: 5s
    retries: 3
    start_period: 10s

services:
  # ── Gateway (public, handles auth + federation) ──
  gateway:
    image: ghcr.io/iorlas/reelm-gateway:${IMAGE_TAG}
    expose:
      - "3000"
    networks:
      - dokploy-network
    restart: unless-stopped
    depends_on:
      reelm-transmission:
        condition: service_healthy
      reelm-jackett:
        condition: service_healthy
      reelm-storage:
        condition: service_healthy
    labels:
      traefik.enable: "true"
      traefik.http.routers.reelm.rule: Host(`reelm.shen.iorlas.net`)
      traefik.http.routers.reelm.entrypoints: websecure
      traefik.http.routers.reelm.tls.certresolver: letsencrypt
      traefik.http.services.reelm.loadbalancer.server.port: "3000"

  # ── Reelm MCP servers (internal, no auth) ──
  reelm-transmission:
    <<: *reelm
    command: ["sh", "-c", "uv run uvicorn mcps.server:transmission --host 0.0.0.0 --port 8000"]
    environment:
      TRANSMISSION_HOST: torrents.segaa.keenetic.link
      TRANSMISSION_PORT: "443"
      TRANSMISSION_PATH: /transmission/rpc
      TRANSMISSION_USER: ${TRANSMISSION_USER}
      TRANSMISSION_PASS: ${TRANSMISSION_PASS}
      TRANSMISSION_SSL: "true"

  reelm-jackett:
    <<: *reelm
    command: ["sh", "-c", "uv run uvicorn mcps.server:jackett --host 0.0.0.0 --port 8000"]
    environment:
      JACKETT_URL: http://jackett:9117
      JACKETT_API_KEY: ${JACKETT_API_KEY}
    depends_on:
      jackett:
        condition: service_healthy

  reelm-storage:
    <<: *reelm
    command: ["sh", "-c", "uv run uvicorn mcps.server:storage --host 0.0.0.0 --port 8000"]
    environment:
      WEBDAV_URL: ${WEBDAV_URL}
      WEBDAV_USER: ${WEBDAV_USER}
      WEBDAV_PASS: ${WEBDAV_PASS}

  # ── Jackett (torrent indexer) ──
  jackett:
    image: linuxserver/jackett:latest
    volumes:
      - jackett-config:/config
    expose:
      - "9117"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9117"]
      interval: 30s
      timeout: 3s
      start_period: 10s
    networks:
      - dokploy-network
    labels:
      tailscale: "true"
      traefik.enable: "true"
      traefik.http.routers.reelm-jackett-admin.rule: Host(`jackett.ts.shen.iorlas.net`)
      traefik.http.routers.reelm-jackett-admin.entrypoints: web
      traefik.http.services.reelm-jackett-admin.loadbalancer.server.port: "9117"
    restart: unless-stopped

volumes:
  jackett-config:

networks:
  dokploy-network:
    external: true
