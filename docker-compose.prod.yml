x-reelm: &reelm
  image: ghcr.io/iorlas/reelm:${IMAGE_TAG}
  expose:
    - "8000"
  networks:
    - dokploy-network
  restart: unless-stopped
  healthcheck:
    test: ["CMD-SHELL", "curl -sf -o /dev/null -w '%{http_code}' http://localhost:8000/ | grep -qE '200|404|406'"]
    interval: 10s
    timeout: 5s
    retries: 5
    start_period: 30s

services:
  # ── Gateway (public, handles auth + federation) ──
  gateway:
    <<: *reelm
    command: ["sh", "-c", "uv run uvicorn mcps.gateway:app --host 0.0.0.0 --port 8000"]
    environment:
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      BASE_URL: https://reelm.shen.iorlas.net
      TRANSMISSION_MCP_URL: http://reelm-transmission:8000/mcp/
      JACKETT_MCP_URL: http://reelm-jackett:8000/mcp/
      STORAGE_MCP_URL: http://reelm-storage:8000/mcp/
      TMDB_MCP_URL: http://reelm-tmdb:8000/mcp/
      OPENMEMORY_URL: http://openmemory-api:8080
    depends_on:
      reelm-transmission:
        condition: service_healthy
      reelm-jackett:
        condition: service_healthy
      reelm-storage:
        condition: service_healthy
      reelm-tmdb:
        condition: service_healthy
      openmemory-api:
        condition: service_healthy
    networks:
      - dokploy-network
      - reelm-internal
    labels:
      traefik.enable: "true"
      traefik.http.routers.reelm.rule: Host(`reelm.shen.iorlas.net`)
      traefik.http.routers.reelm.entrypoints: websecure
      traefik.http.routers.reelm.tls.certresolver: letsencrypt
      traefik.http.services.reelm.loadbalancer.server.port: "8000"

  # ── Reelm MCP servers (internal, no auth) ──
  reelm-transmission:
    <<: *reelm
    command: ["sh", "-c", "uv run uvicorn mcps.server:transmission --host 0.0.0.0 --port 8000"]
    environment:
      TRANSMISSION_HOST: torrents.segaa.keenetic.link
      TRANSMISSION_PORT: "443"
      TRANSMISSION_PATH: /transmission/rpc
      TRANSMISSION_USER: ${TRANSMISSION_USER}
      TRANSMISSION_PASS: ${TRANSMISSION_PASS}
      TRANSMISSION_SSL: "true"

  reelm-jackett:
    <<: *reelm
    command: ["sh", "-c", "uv run uvicorn mcps.server:jackett --host 0.0.0.0 --port 8000"]
    environment:
      JACKETT_URL: http://jackett:9117
      JACKETT_API_KEY: ${JACKETT_API_KEY}
    depends_on:
      jackett:
        condition: service_healthy

  reelm-storage:
    <<: *reelm
    command: ["sh", "-c", "uv run uvicorn mcps.server:storage --host 0.0.0.0 --port 8000"]
    environment:
      WEBDAV_URL: ${WEBDAV_URL}
      WEBDAV_USER: ${WEBDAV_USER}
      WEBDAV_PASS: ${WEBDAV_PASS}

  reelm-tmdb:
    <<: *reelm
    command: ["sh", "-c", "uv run uvicorn mcps.server:tmdb --host 0.0.0.0 --port 8000"]
    environment:
      TMDB_API_KEY: ${TMDB_API_KEY}

  # ── Jackett (torrent indexer) ──
  jackett:
    image: linuxserver/jackett:latest
    volumes:
      - jackett-config:/config
    expose:
      - "9117"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9117"]
      interval: 30s
      timeout: 3s
      start_period: 10s
    networks:
      - dokploy-network
    labels:
      tailscale: "true"
      traefik.enable: "true"
      traefik.http.routers.reelm-jackett-admin.rule: Host(`jackett.ts.shen.iorlas.net`)
      traefik.http.routers.reelm-jackett-admin.entrypoints: web
      traefik.http.services.reelm-jackett-admin.loadbalancer.server.port: "9117"
    restart: unless-stopped

  # ── OpenMemory infrastructure (internal, no external access) ──
  openmemory-db:
    image: pgvector/pgvector:pg16
    pull_policy: always
    environment:
      POSTGRES_USER: ${OPENMEMORY_POSTGRES_USER}
      POSTGRES_PASSWORD: ${OPENMEMORY_POSTGRES_PASSWORD}
      POSTGRES_DB: openmemory
    volumes:
      - openmemory-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${OPENMEMORY_POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - reelm-internal
    restart: unless-stopped

  openmemory-api:
    image: ghcr.io/mem0ai/openmemory:latest
    pull_policy: always
    environment:
      LLM_PROVIDER: openai
      LLM_BASE_URL: http://litellm:4000
      LLM_API_KEY: no-auth
      LLM_MODEL: llama3.2:3b
      EMBEDDER_PROVIDER: openai
      EMBEDDER_BASE_URL: http://litellm:4000
      EMBEDDER_API_KEY: no-auth
      EMBEDDER_MODEL: nomic-embed-text
      DATABASE_URL: postgresql://${OPENMEMORY_POSTGRES_USER}:${OPENMEMORY_POSTGRES_PASSWORD}@openmemory-db:5432/openmemory
      VECTOR_STORE_PROVIDER: pgvector
    depends_on:
      openmemory-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - dokploy-network
      - reelm-internal
    restart: unless-stopped

volumes:
  jackett-config:
  openmemory-pgdata:

networks:
  dokploy-network:
    external: true
  reelm-internal:
    internal: true
