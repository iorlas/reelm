x-reelm: &reelm
  image: ghcr.io/iorlas/reelm:${IMAGE_TAG}
  expose:
    - "8000"
  networks:
    - dokploy-network
  restart: unless-stopped
  healthcheck:
    test: ["CMD-SHELL", "curl -sf -o /dev/null -w '%{http_code}' http://localhost:8000/ | grep -qE '200|404|406'"]
    interval: 10s
    timeout: 5s
    retries: 5
    start_period: 30s

services:
  # ── Gateway (public, handles auth + federation) ──
  gateway:
    <<: *reelm
    command: ["sh", "-c", "uv run uvicorn mcps.gateway:app --host 0.0.0.0 --port 8000"]
    environment:
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      BASE_URL: https://reelm.shen.iorlas.net
      TRANSMISSION_MCP_URL: http://reelm-transmission:8000/mcp/
      JACKETT_MCP_URL: http://reelm-jackett:8000/mcp/
      STORAGE_MCP_URL: http://reelm-storage:8000/mcp/
      TMDB_MCP_URL: http://reelm-tmdb:8000/mcp/
      OPENVIKING_URL: http://openviking:1933
    depends_on:
      reelm-transmission:
        condition: service_healthy
      reelm-jackett:
        condition: service_healthy
      reelm-storage:
        condition: service_healthy
      reelm-tmdb:
        condition: service_healthy
      openviking:
        condition: service_healthy
    networks:
      - dokploy-network
      - reelm-internal
    labels:
      traefik.enable: "true"
      traefik.http.routers.reelm.rule: Host(`reelm.shen.iorlas.net`)
      traefik.http.routers.reelm.entrypoints: websecure
      traefik.http.routers.reelm.tls.certresolver: letsencrypt
      traefik.http.services.reelm.loadbalancer.server.port: "8000"

  # ── Reelm MCP servers (internal, no auth) ──
  reelm-transmission:
    <<: *reelm
    command: ["sh", "-c", "uv run uvicorn mcps.server:transmission --host 0.0.0.0 --port 8000"]
    environment:
      TRANSMISSION_HOST: torrents.segaa.keenetic.link
      TRANSMISSION_PORT: "443"
      TRANSMISSION_PATH: /transmission/rpc
      TRANSMISSION_USER: ${TRANSMISSION_USER}
      TRANSMISSION_PASS: ${TRANSMISSION_PASS}
      TRANSMISSION_SSL: "true"

  reelm-jackett:
    <<: *reelm
    command: ["sh", "-c", "uv run uvicorn mcps.server:jackett --host 0.0.0.0 --port 8000"]
    environment:
      JACKETT_URL: http://jackett:9117
      JACKETT_API_KEY: ${JACKETT_API_KEY}
    depends_on:
      jackett:
        condition: service_healthy

  reelm-storage:
    <<: *reelm
    command: ["sh", "-c", "uv run uvicorn mcps.server:storage --host 0.0.0.0 --port 8000"]
    environment:
      WEBDAV_URL: ${WEBDAV_URL}
      WEBDAV_USER: ${WEBDAV_USER}
      WEBDAV_PASS: ${WEBDAV_PASS}

  reelm-tmdb:
    <<: *reelm
    command: ["sh", "-c", "uv run uvicorn mcps.server:tmdb --host 0.0.0.0 --port 8000"]
    environment:
      TMDB_API_KEY: ${TMDB_API_KEY}

  # ── Jackett (torrent indexer) ──
  jackett:
    image: linuxserver/jackett:latest
    pull_policy: always
    volumes:
      - jackett-config:/config
    expose:
      - "9117"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9117"]
      interval: 30s
      timeout: 3s
      start_period: 10s
    networks:
      - dokploy-network
    labels:
      tailscale: "true"
      traefik.enable: "true"
      traefik.http.routers.reelm-jackett-admin.rule: Host(`jackett.ts.shen.iorlas.net`)
      traefik.http.routers.reelm-jackett-admin.entrypoints: web
      traefik.http.services.reelm-jackett-admin.loadbalancer.server.port: "9117"
    restart: unless-stopped

  # ── OpenViking (household memory) ──
  openviking:
    image: ghcr.io/volcengine/openviking:main
    pull_policy: always
    command: >
      sh -c 'cat > /app/ov.conf <<CONF
      {
        "storage": {"workspace": "/app/data"},
        "vlm": {
          "provider": "openai",
          "api_base": "http://litellm:4000/v1",
          "api_key": "no-auth",
          "model": "llama3.2:3b"
        },
        "embedding": {
          "dense": {
            "provider": "openai",
            "api_base": "http://litellm:4000/v1",
            "api_key": "no-auth",
            "model": "nomic-embed-text",
            "dimension": 768
          }
        }
      }
      CONF
      openviking-server'
    volumes:
      - openviking-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:1933/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - dokploy-network
      - reelm-internal
    restart: unless-stopped

volumes:
  jackett-config:
  openviking-data:

networks:
  dokploy-network:
    external: true
  reelm-internal:
    internal: true
